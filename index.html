<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기 & 제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body data-theme="dark">
  <div class="noise-overlay"></div>
  <button id="theme-toggle">라이트 모드로 전환</button>
  
  <main class="lotto-section">
    <h1>로또 번호 생성기</h1>
    <div id="lotto-numbers" class="lotto-numbers-container"></div>
    <button id="generate-btn">번호 생성하기</button>
  </main>

  <section class="contact-section">
    <div class="contact-container">
      <h2>제휴 문의</h2>
      <p class="section-desc">궁금하신 점이나 제휴 제안이 있으시면 아래 폼을 통해 문의해 주세요.</p>
      
      <form action="https://formspree.io/f/maqpdqre" method="POST" class="contact-form" id="contact-form">
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required autocomplete="name">
        </div>
        
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="_replyto" placeholder="example@email.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 입력해 주세요." required></textarea>
        </div>
        
        <button type="submit" id="submit-btn">문의 보내기</button>
      </form>
    </div>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
