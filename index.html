<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 인공지능이 알려주는 나의 닮은 동물</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">
    <div class="noise-overlay"></div>
    
    <header>
        <button id="theme-toggle" class="theme-button">라이트 모드</button>
        <div class="hero-container">
            <h1 class="hero-title">나의 동물상 찾기</h1>
            <p class="hero-subtitle">인공지능이 분석하는 나의 닮은 동물은 무엇일까요?</p>
        </div>
    </header>

    <main class="main-content">
        <section class="test-section card">
            <div class="mode-selector">
                <button id="mode-webcam" class="mode-btn active">실시간 웹캠</button>
                <button id="mode-upload" class="mode-btn">사진 업로드</button>
            </div>

            <div id="webcam-container" class="preview-container">
                <div class="loader" id="webcam-loader">모델 로딩 중...</div>
                <!-- Webcam canvas will be appended here -->
            </div>

            <div id="upload-container" class="preview-container hidden">
                <label for="image-upload" class="upload-label">
                    <div class="upload-icon">📸</div>
                    <span>클릭하여 사진을 업로드하거나 드래그하세요</span>
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                </label>
                <img id="image-preview" class="hidden" alt="사진 미리보기">
            </div>

            <div class="controls">
                <button id="start-btn" class="primary-btn">분석 시작하기</button>
                <button id="retry-btn" class="secondary-btn hidden">다시 하기</button>
            </div>
        </section>

        <section id="result-section" class="result-section card hidden">
            <h2 class="result-title">분석 결과</h2>
            <div id="label-container" class="label-container">
                <!-- Prediction bars will be appended here -->
            </div>
            <p id="result-message" class="result-message"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AI Animal Face Test. Powered by Teachable Machine.</p>
    </footer>

    <!-- TensorFlow.js and Teachable Machine Image Library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>

  </body>
</html>
