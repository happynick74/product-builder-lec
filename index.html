<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기 & 제휴 문의</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body data-theme="dark">
  <div class="noise-overlay"></div>
  <button id="theme-toggle">라이트 모드로 전환</button>
  
  <main class="lotto-section">
    <h1>로또 번호 생성기</h1>
    <div id="lotto-numbers" class="lotto-numbers-container"></div>
    <button id="generate-btn">번호 생성하기</button>
  </main>

  <section class="contact-section">
    <div class="contact-container">
      <h2>제휴 문의</h2>
      <p class="section-desc">궁금하신 점이나 제휴 제안이 있으시면 아래 폼을 통해 문의해 주세요.</p>
      
      <form action="https://formspree.io/f/maqpdqre" method="POST" class="contact-form" id="contact-form">
        <!-- Identifying the form for the user's dashboard -->
        <input type="hidden" name="_subject" value="[제휴 문의] 새로운 메시지가 도착했습니다">
        
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required autocomplete="name">
        </div>
        
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 입력해 주세요." required></textarea>
        </div>
        
        <button type="submit" id="contact-submit-btn">문의 보내기</button>
      </form>
    </div>
  </section>

  <section class="comments-section">
    <div class="comments-container">
      <h2>댓글 남기기</h2>
      <p class="section-desc">사용 후기나 개선 요청 사항을 자유롭게 남겨주세요.</p>
      
      <form action="https://formspree.io/f/maqpdqre" method="POST" class="contact-form" id="comment-form">
        <!-- Identifying the form for the user's dashboard -->
        <input type="hidden" name="_subject" value="[사용자 댓글] 새로운 댓글이 도착했습니다">
        
        <div class="form-group">
          <label for="comment-email">이메일</label>
          <input type="email" id="comment-email" name="email" placeholder="example@email.com" required>
        </div>
        
        <div class="form-group">
          <label for="comment-message">댓글 내용</label>
          <textarea id="comment-message" name="message" rows="4" placeholder="댓글을 입력해 주세요." required></textarea>
        </div>
        
        <button type="submit" id="comment-submit-btn">댓글 등록하기</button>
      </form>
    </div>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
